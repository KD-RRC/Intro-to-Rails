<svg viewBox="0 0 1100 650" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="1100" height="650" fill="#ffffff"/>

  <!-- Connections -->
  <g stroke="#333" stroke-width="1.5" fill="none">
    <line x1="260" y1="110" x2="440" y2="290"/>
    <line x1="840" y1="100" x2="660" y2="290"/>
    <line x1="550" y1="400" x2="550" y2="440"/>
    <line x1="260" y1="510" x2="440" y2="510"/>
    <line x1="660" y1="300" x2="840" y2="300"/>
    <line x1="950" y1="380" x2="950" y2="440"/>
  </g>

  <!-- Cardinality labels -->
  <g font-size="13" fill="#333">
    <text x="300" y="150">1</text><text x="400" y="260">*</text>
    <text x="800" y="150">1</text><text x="700" y="260">*</text>
    <text x="560" y="415">1</text><text x="560" y="435">*</text>
    <text x="290" y="500">1</text><text x="420" y="500">*</text>
    <text x="680" y="290">1</text><text x="820" y="290">*</text>
    <text x="960" y="400">1</text><text x="960" y="430">*</text>
  </g>

  <!-- Brewery -->
  <g>
    <rect x="40" y="40" width="220" height="160" fill="#ffffff" stroke="#333" stroke-width="1.5" rx="4"/>
    <rect x="40" y="40" width="220" height="30" fill="#eeeeee" stroke="#333" stroke-width="1.5" rx="4"/>
    <text x="150" y="60" text-anchor="middle" fill="#000" font-weight="bold" font-size="14">breweries</text>
    <line x1="40" y1="70" x2="260" y2="70" stroke="#333" stroke-width="1.5"/>
    <text x="52" y="88" font-size="12">id (PK)</text>
    <text x="52" y="105" font-size="12">name</text>
    <text x="52" y="122" font-size="12">brewery_type</text>
    <text x="52" y="139" font-size="12">city, state_province</text>
    <text x="52" y="156" font-size="12">country</text>
    <text x="52" y="173" font-size="12">latitude, longitude</text>
    <text x="52" y="190" font-size="12">website_url</text>
  </g>

  <!-- Style -->
  <g>
    <rect x="840" y="40" width="220" height="100" fill="#ffffff" stroke="#333" stroke-width="1.5" rx="4"/>
    <rect x="840" y="40" width="220" height="30" fill="#eeeeee" stroke="#333" stroke-width="1.5" rx="4"/>
    <text x="950" y="60" text-anchor="middle" fill="#000" font-weight="bold" font-size="14">styles</text>
    <line x1="840" y1="70" x2="1060" y2="70" stroke="#333" stroke-width="1.5"/>
    <text x="852" y="88" font-size="12">id (PK)</text>
    <text x="852" y="105" font-size="12">name</text>
  </g>

  <!-- Beer (central) -->
  <g>
    <rect x="440" y="220" width="220" height="180" fill="#ffffff" stroke="#333" stroke-width="2" rx="4"/>
    <rect x="440" y="220" width="220" height="30" fill="#eeeeee" stroke="#333" stroke-width="2" rx="4"/>
    <text x="550" y="240" text-anchor="middle" fill="#000" font-weight="bold" font-size="14">beers</text>
    <line x1="440" y1="250" x2="660" y2="250" stroke="#333" stroke-width="2"/>
    <text x="452" y="268" font-size="12">id (PK)</text>
    <text x="452" y="285" font-size="12">name</text>
    <text x="452" y="302" font-size="12">abv</text>
    <text x="452" y="319" font-size="12">ibu</text>
    <text x="452" y="336" font-size="12">brewery_id (FK)</text>
    <text x="452" y="353" font-size="12">style_id (FK)</text>
    <text x="452" y="370" font-size="12">has_many: reviews, hops</text>
  </g>

  <!-- User -->
  <g>
    <rect x="40" y="440" width="220" height="100" fill="#ffffff" stroke="#333" stroke-width="1.5" rx="4"/>
    <rect x="40" y="440" width="220" height="30" fill="#eeeeee" stroke="#333" stroke-width="1.5" rx="4"/>
    <text x="150" y="460" text-anchor="middle" fill="#000" font-weight="bold" font-size="14">users</text>
    <line x1="40" y1="470" x2="260" y2="470" stroke="#333" stroke-width="1.5"/>
    <text x="52" y="488" font-size="12">id (PK)</text>
    <text x="52" y="505" font-size="12">username, email</text>
  </g>

  <!-- Review -->
  <g>
    <rect x="440" y="440" width="220" height="160" fill="#ffffff" stroke="#333" stroke-width="1.5" rx="4"/>
    <rect x="440" y="440" width="220" height="30" fill="#eeeeee" stroke="#333" stroke-width="1.5" rx="4"/>
    <text x="550" y="460" text-anchor="middle" fill="#000" font-weight="bold" font-size="14">reviews</text>
    <line x1="440" y1="470" x2="660" y2="470" stroke="#333" stroke-width="1.5"/>
    <text x="452" y="488" font-size="12">id (PK)</text>
    <text x="452" y="505" font-size="12">rating</text>
    <text x="452" y="522" font-size="12">body</text>
    <text x="452" y="539" font-size="12">user_id (FK)</text>
    <text x="452" y="556" font-size="12">beer_id (FK)</text>
  </g>

  <!-- BeerHop (join table) -->
  <g>
    <rect x="840" y="240" width="220" height="120" fill="#ffffff" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" rx="4"/>
    <rect x="840" y="240" width="220" height="30" fill="#eeeeee" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" rx="4"/>
    <text x="950" y="260" text-anchor="middle" fill="#000" font-weight="bold" font-size="13">beer_hops (join)</text>
    <line x1="840" y1="270" x2="1060" y2="270" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="852" y="288" font-size="12">id (PK)</text>
    <text x="852" y="305" font-size="12">beer_id (FK)</text>
    <text x="852" y="322" font-size="12">hop_id (FK)</text>
  </g>

  <!-- Hop -->
  <g>
    <rect x="840" y="440" width="220" height="100" fill="#ffffff" stroke="#333" stroke-width="1.5" rx="4"/>
    <rect x="840" y="440" width="220" height="30" fill="#eeeeee" stroke="#333" stroke-width="1.5" rx="4"/>
    <text x="950" y="460" text-anchor="middle" fill="#000" font-weight="bold" font-size="14">hops</text>
    <line x1="840" y1="470" x2="1060" y2="470" stroke="#333" stroke-width="1.5"/>
    <text x="852" y="488" font-size="12">id (PK)</text>
    <text x="852" y="505" font-size="12">name</text>
  </g>

  <text x="550" y="630" text-anchor="middle" font-size="13" fill="#555">Brew Finder — Entity Relationship Diagram</text>
</svg>
